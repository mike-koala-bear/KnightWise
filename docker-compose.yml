# Optional: only needed from PR #3+ when we migrate off SQLite.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: knightwise
      POSTGRES_PASSWORD: knightwise
      POSTGRES_DB: knightwise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
