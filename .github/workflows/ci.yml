name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @knightwise/chess typecheck
      - run: pnpm --filter @knightwise/web typecheck
      - run: pnpm --filter @knightwise/web lint

  api:
    name: API (ruff + pytest + alembic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Pin Python
        run: uv python install 3.13
      - name: Install deps
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Alembic upgrade (SQLite)
        working-directory: apps/api
        run: uv run alembic upgrade head
      - name: Pytest
        working-directory: apps/api
        run: uv run pytest -v
